<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Transport System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5 p-4" style="background-color: rgb(48, 241, 202);">
        <form>
            <div class="row justify-content-center">
                <h2 class="text-center mb-4">Bus Transport Booking System</h2>
             <div class="col-12 col-md-6 mb-3">
               <label class="form-label"> First Name Of Booking Officer</label>
               <input type="text" class="form-control" placeholder="First Name">
            </div>
            <div class="col-12 col-md-6 mb-3">
                <label class="form-label"> Last Name Of Booking Officer</label>
                <input type="text" class="form-control" placeholder="Last Name">
            </div>
            <div class="col-12 col-md-6 mb-3">
                 <label class="form-label">Number of people going</label>
                 <input type="text" class="form-control" placeholder="Number of people">
            </div>
            <div class="col-12 col-md-6 mb-3">
                <label class="form-label">Number of seats</label>
                <input type="number" class="form-control" placeholder="Number of seats">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Date of Pick up</label>
                <input type="date" class="form-control">
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Time Of Pick Up</label>
                <input type="time" class="form-control">
            </div>
            <div class="col-12 mb-2">
                <label class="form-label">Pick up Point</label>
                <input type="text" class="form-control" placeholder="Street Address">
            </div>
            <div class="col-12 mb-3">
                <input type="text" class="form-control" placeholder="Street Address Line 2">
            </div>
            <div class="col-12 col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="city">
            </div>
            <div class="col-12 col-md-6 mb-3">
                 <input type="text" class="form-control" placeholder="Region">
            </div>
            <div class="col-12 col-md-6 mb-3">
                <input type="text" class="form-control" placeholder="Postal/Zip Code">
            </div>
            <div class="col-12 col-md-6 mb-3">
                <select class="form-select">
                    <option value="1"  selected>State</option>
                    <option value="2">Gujarat</option>
                </select>
            </div>
            <div class="col-12 mb-3">
                <label class="form-label">Destination Address</label>
                <input type="text" class="form-control" placeholder="Street Address">
            </div>
            <div class="col-12 mb-3">
                <input type="text" class="form-control" placeholder="Street Address Line 2">
            </div>
            <div class="col-12 d-grid">
                 <button class="btn btn-primary">Submit</button>
            </div>
        </div>
        </form>    
    </div>
</body>
</html>
