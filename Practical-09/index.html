<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout page</title>
<link rel="stylesheet" href="bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body style="background-color: aliceblue;">
<div class="container mt-5 p-4">
<h2 class="text-center text-primary">CheckOut Page</h2><hr>
<div class="row">
<div class="col-12 col-lg-6">
<form>
<div class="row justify-content-center">
<div class="col-md-6 mb-3">
<label class="form-label">Firstname*</label>
<input type="text" class="form-control" placeholder="Enter the first name">
 
</div>
<div class="col-md-6 mb-3">
<label class="form-label">Lastname*</label>
<input type="text" class="form-control" placeholder="Enter the last name">
</div>
<div class="col-12 mb-3">
<label class="form-label">Company name(optional)</label>
<input type="text" class="form-control" placeholder="Company name">
</div>
<div class="col-12 mb-3">
<label class="form-label">Country/Region</label>
<select class="form-select">
<option selected>Select a country or region</option>
<option>India</option>
</select>
</div>
<div class="col-12 mb-3">
<label class="form-label">Street address*</label>
<input type="text" class="form-control" placeholder="Street Address 1">
</div>
<div class="col-12 mb-3">
 
<input type="text" class="form-control" placeholder="Street Address
2">
</div>
<div class="col-12 mb-3">
<label class="form-label">State/Country*</label>
<input type="text" class="form-control" >
</div>
<div class="col-12 mb-3">
<label class="form-label">Postal/Zip*</label>
<input type="number" class="form-control">
</div>
<div class="col-md-6 mb-3">
<label class="form-label">Phone*</label>
<input type="number" class="form-control" placeholder="Enter Mobile number">
</div>
<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter the Email">
</div><hr>
<div class="mb-1">
 
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Sign me up to receive email updates and news(optional)</label>
</div>
<div class="mb-3">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">Save this information for next time</label>
</div><hr>
<h5 class="mb-3">Payment Info</h5>
<div class="form-check">
<input type="radio" class="form-check-input" name="radioDefault">
<label class="form-check-label"> Credit Card
</label>
</div>
<div class="form-check">
<input type="radio" class="form-check-input" name="radioDefault">
<label class="form-check-label"> Debit Card
</label>
</div>
 
<div class="form-check">
<input type="radio" class="form-check-input" name="radioDefault">
<label class="form-check-label"> UPI
</label>
</div>
<div class="row">
<div class="col-12 col-md-6 mb-3">
<label>Name on card</label>
<input type="text" class="form-control">
<small class="text-muted">Full Name As Displayed on card</small>
</div>


<div class="col-12 col-md-6 mb-3">
<label>Credit card number</label>
<input type="text" class="form-control">
</div>


<div class="col-3 mb-3">
<label>Expiration</label>
<input type="text" class="form-control">
 
</div>
<div class="col-3 mb-3">
<label>CVV</label>
<input type="text" class="form-control">
</div>
<hr>
<div class="d-grid mb-3">
<button class="btn btn-primary"> Continue To Checkout
</button>
</div>
</div>
</div>
</form>
</div>
<div class="col-12 col-lg-6">
<div class="d-flex justify-content-between mb-2">
<h5 class="text-primary">Your Cart</h5>
<h5 class="text-primary">3</h5>
</div>
<div class="card p-4 shadow-sm">
 


<div class="d-flex justify-content-between mb-2">
<span>Gummies×2</span>
<span>₹50</span>
</div>


<div class="d-flex justify-content-between mb-2">
<span>Chocolates×2</span>
<span>₹20</span>
</div>


<div class="d-flex justify-content-between mb-2">
<span>Pen</span>
<span>₹5</span>
</div>


<hr>
<div class="d-flex justify-content-between mb-2">
<span>Total</span>
<span>₹75</span>
</div>
 
<hr>
</div>
</div>
</div>
</div>
</body>
</html>
